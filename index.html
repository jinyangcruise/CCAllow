<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>CCAllow</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#374151;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#4f46e5}
body{font-family:system-ui,sans-serif;background:#1a1a2e;color:#e0e0e0;padding:20px 24px}
h1{font-size:20px;color:#fff}
.subtitle{font-size:12px;color:#64748b;margin-bottom:16px}

.card{background:#16213e;border:1px solid #2d2d4a;border-radius:12px;padding:16px;margin-bottom:10px}
.card-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.card-label{font-size:14px;color:#e0e0e0}
.card-desc{font-size:12px;color:#64748b;margin-top:2px}

.toggle-switch{position:relative;width:48px;height:26px;flex-shrink:0;cursor:pointer}
.toggle-switch input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;background:#374151;border-radius:13px;transition:.2s}
.slider::before{content:'';position:absolute;width:20px;height:20px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
.toggle-switch input:checked+.slider{background:#4f46e5}
.toggle-switch input:checked+.slider::before{transform:translateX(22px)}

.sub-card{margin-top:10px;margin-left:4px;padding:12px 16px;background:#0f172a;border-radius:10px;border:1px solid #2d2d4a;display:none}
.sub-card.visible{display:block}
.sub-card label{display:block;font-size:12px;color:#94a3b8;margin-bottom:4px}
.sub-card .field-row{display:flex;align-items:center;gap:8px}
.sub-card input[type=range]{flex:1;accent-color:#4f46e5;height:4px;cursor:pointer}
.sub-card .val{font-size:13px;color:#e0e0e0;min-width:48px;text-align:right;font-variant-numeric:tabular-nums}
.sub-card .hint{font-size:11px;color:#475569;margin-top:6px;line-height:1.4}

.status{margin-top:4px;padding:8px 12px;border-radius:8px;font-size:13px}
.status.idle{background:#1e3a5f;color:#93c5fd}
.status.active{background:#14532d;color:#86efac}
.status.error{background:#450a0a;color:#fca5a5}

.log-top{display:flex;justify-content:space-between;align-items:center;margin-top:10px;gap:4px}
.log-top span{font-size:11px;color:#64748b;flex:1}
.log-top button{background:transparent;border:1px solid #444;color:#94a3b8;padding:2px 10px;border-radius:4px;cursor:pointer;font-size:11px}
.log-top button:hover{border-color:#4f46e5;color:#fff}
.log{margin-top:4px;background:#0f172a;border-radius:8px;padding:8px;height:80px;overflow-y:auto;font-size:11px;font-family:monospace;white-space:pre-wrap;color:#94a3b8}
.footer{margin-top:auto;text-align:center;font-size:11px;color:#475569;padding-top:10px}
</style>
</head>
<body>

<h1>CCAllow</h1>
<div class="subtitle">UI Automation · 自动点击 Allow 按钮</div>

<div class="card">
    <div class="card-row">
        <div>
            <div class="card-label">Auto Allow</div>
            <div class="card-desc">检测到 Allow 按钮时自动点击</div>
        </div>
        <label class="toggle-switch">
            <input type="checkbox" id="toggle">
            <span class="slider"></span>
        </label>
    </div>
</div>

<div class="card">
    <div class="card-row">
        <div>
            <div class="card-label">最小化时轮询</div>
            <div class="card-desc">Claude 最小化后，定期唤醒检查 Allow 请求<br>√ 优点：最小化时也能自动 Allow<br>× 缺点：窗口会短暂在后台闪现</div>
        </div>
        <label class="toggle-switch">
            <input type="checkbox" id="minPoll">
            <span class="slider"></span>
        </label>
    </div>
    <div class="sub-card" id="intervalCard">
        <label>轮询间隔</label>
        <div class="field-row">
            <input type="range" id="intervalRange" min="500" max="5000" step="100">
            <span class="val" id="intervalVal">2.5s</span>
        </div>
        <div class="hint">间隔越短响应越快，但窗口闪现更频繁。建议 2–3 秒。</div>
        <div style="margin-top:10px;display:flex;align-items:center;gap:8px">
            <input type="checkbox" id="minAfterAllow" style="width:14px;height:14px;accent-color:#4f46e5;cursor:pointer">
            <label for="minAfterAllow" style="font-size:12px;color:#94a3b8;cursor:pointer">Allow 后自动最小化窗口</label>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-row">
        <div>
            <div class="card-label">开机自动启动</div>
            <div class="card-desc">系统启动时自动运行</div>
        </div>
        <label class="toggle-switch">
            <input type="checkbox" id="autoStart">
            <span class="slider"></span>
        </label>
    </div>
</div>

<div class="card">
    <div class="card-row">
        <div>
            <div class="card-label">静默启动</div>
            <div class="card-desc">启动时不显示主窗口，仅在托盘运行</div>
        </div>
        <label class="toggle-switch">
            <input type="checkbox" id="silentStart">
            <span class="slider"></span>
        </label>
    </div>
</div>

<div id="status" class="status idle">就绪</div>

<div class="log-top"><span>日志</span><button id="clearLog">清空</button><button id="copyLog">复制</button></div>
<div class="log" id="log">[CCAllow] 启动完成</div>

<div class="footer">通过 Windows UI Automation 工作</div>

<script>
var toggle = document.getElementById('toggle');
var minPoll = document.getElementById('minPoll');
var intervalRange = document.getElementById('intervalRange');
var intervalVal = document.getElementById('intervalVal');
var intervalCard = document.getElementById('intervalCard');
var autoStart = document.getElementById('autoStart');
var silentStartEl = document.getElementById('silentStart');
var statusEl = document.getElementById('status');
var logEl = document.getElementById('log');

function setStatus(msg, type) {
    statusEl.textContent = msg;
    statusEl.className = 'status ' + (type || 'idle');
}

function log(msg) {
    var time = new Date().toLocaleTimeString();
    logEl.textContent += '\n[' + time + '] ' + msg;
    logEl.scrollTop = logEl.scrollHeight;
}

function formatInterval(ms) {
    return ms >= 1000 ? (ms / 1000).toFixed(1) + 's' : ms + 'ms';
}

// --- Load settings ---
window.ccallow.getStatus().then(function(state) {
    toggle.checked = state.enabled;
    if (state.enabled) setStatus('监控中...', 'active');
});

window.ccallow.getMinimizedPolling().then(function(state) {
    minPoll.checked = state.enabled;
    intervalCard.classList.toggle('visible', state.enabled);
});

window.ccallow.getMinimizedInterval().then(function(state) {
    intervalRange.value = state.interval;
    intervalVal.textContent = formatInterval(state.interval);
});

window.ccallow.getAutoStart().then(function(state) {
    autoStart.checked = state.enabled;
});

window.ccallow.getSilentStart().then(function(state) {
    silentStartEl.checked = state.enabled;
});

window.ccallow.getMinimizeAfterAllow().then(function(state) {
    document.getElementById('minAfterAllow').checked = state.enabled;
});

window.ccallow.onMonitorLog(function(msg) {
    log(msg);
});

// --- Auto Allow toggle ---
toggle.addEventListener('change', async function() {
    var result = await window.ccallow.toggleMonitor();
    toggle.checked = result.enabled;
    if (result.enabled) {
        setStatus('监控中... 检测到 Allow 按钮将自动点击', 'active');
        log('监控已启动');
    } else {
        setStatus('已停止', 'idle');
        log('监控已停止');
    }
});

// --- Minimized polling ---
minPoll.addEventListener('change', async function() {
    var result = await window.ccallow.setMinimizedPolling(minPoll.checked);
    intervalCard.classList.toggle('visible', result.enabled);
    log(result.enabled ? '已开启最小化轮询' : '已关闭最小化轮询');
});

intervalRange.addEventListener('input', async function() {
    var val = parseInt(intervalRange.value);
    intervalVal.textContent = formatInterval(val);
    await window.ccallow.setMinimizedInterval(val);
});

document.getElementById('minAfterAllow').addEventListener('change', async function() {
    var result = await window.ccallow.setMinimizeAfterAllow(this.checked);
    log(result.enabled ? 'Allow 后自动最小化已开启' : 'Allow 后自动最小化已关闭');
});

// --- Tray toggle ---
window.ccallow.onTrayToggle(async function() {
    var result = await window.ccallow.toggleMonitor();
    toggle.checked = result.enabled;
    if (result.enabled) { setStatus('监控中...', 'active'); log('监控已启动'); }
    else { setStatus('已停止', 'idle'); log('监控已停止'); }
});

// --- Other toggles ---
autoStart.addEventListener('change', async function() {
    var result = await window.ccallow.setAutoStart(autoStart.checked);
    log(result.enabled ? '已开启开机自动启动' : '已关闭开机自动启动');
});

silentStartEl.addEventListener('change', async function() {
    var result = await window.ccallow.setSilentStart(silentStartEl.checked);
    log(result.enabled ? '已开启静默启动' : '已关闭静默启动');
});

// --- Log buttons ---
document.getElementById('clearLog').addEventListener('click', function() {
    logEl.textContent = '';
});

document.getElementById('copyLog').addEventListener('click', function() {
    var text = logEl.textContent;
    navigator.clipboard.writeText(text).then(function() {
        document.getElementById('copyLog').textContent = '已复制';
        setTimeout(function() { document.getElementById('copyLog').textContent = '复制'; }, 1500);
    });
});
</script>

</body>
</html>
