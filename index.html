<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>CCAllow</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#1a1a2e;color:#e0e0e0;padding:24px;display:flex;flex-direction:column;height:100vh}
h1{font-size:20px;color:#fff}
.subtitle{font-size:12px;color:#64748b;margin-bottom:20px}
.toggle-wrap{background:#16213e;border:1px solid #2d2d4a;border-radius:12px;padding:20px;display:flex;align-items:center;justify-content:space-between}
.toggle-label{font-size:14px;color:#e0e0e0}
.toggle-desc{font-size:12px;color:#64748b;margin-top:4px}
.toggle-switch{position:relative;width:48px;height:26px;flex-shrink:0;cursor:pointer}
.toggle-switch input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;background:#374151;border-radius:13px;transition:.2s}
.slider::before{content:'';position:absolute;width:20px;height:20px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
.toggle-switch input:checked+.slider{background:#4f46e5}
.toggle-switch input:checked+.slider::before{transform:translateX(22px)}
.status{margin-top:16px;padding:8px 12px;border-radius:8px;font-size:13px}
.status.idle{background:#1e3a5f;color:#93c5fd}
.status.active{background:#14532d;color:#86efac}
.status.error{background:#450a0a;color:#fca5a5}
.footer{margin-top:auto;text-align:center;font-size:11px;color:#475569;padding-top:16px}
</style>
</head>
<body>

<h1>CCAllow</h1>
<div class="subtitle">UI Automation · 自动点击 Allow 按钮</div>

<div class="toggle-wrap">
    <div>
        <div class="toggle-label">Auto Allow</div>
        <div class="toggle-desc">自动检测并点击 Allow 按钮</div>
    </div>
    <label class="toggle-switch">
        <input type="checkbox" id="toggle">
        <span class="slider"></span>
    </label>
</div>

<div id="status" class="status idle">就绪</div>
<div class="footer">无需 CDP · 通过 Windows UI Automation 工作</div>

<script>
var toggle = document.getElementById('toggle');
var statusEl = document.getElementById('status');

function setStatus(msg, type) {
    statusEl.textContent = msg;
    statusEl.className = 'status ' + (type || 'idle');
}

window.ccallow.getStatus().then(function(state) {
    toggle.checked = state.enabled;
    if (state.enabled) setStatus('监控中...', 'active');
});

toggle.addEventListener('change', async function() {
    var result = await window.ccallow.toggleMonitor();
    toggle.checked = result.enabled;
    if (result.enabled) setStatus('监控中... 检测到 Allow 按钮将自动点击', 'active');
    else setStatus('已停止', 'idle');
});

window.ccallow.onTrayToggle(function() {
    // Tray triggered toggle - sync checkbox state
    setTimeout(async function() {
        var state = await window.ccallow.getStatus();
        toggle.checked = state.enabled;
        if (state.enabled) setStatus('监控中...', 'active');
        else setStatus('已停止', 'idle');
    }, 100);
});
</script>

</body>
</html>
